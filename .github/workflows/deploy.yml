name: CI/CD Pipeline

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:

  build-and-push:
    name: Build & Push All Images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push backend images
        run: |
          for svc in user-service course-service enrollment-service notification-service \
                     progress-service media-service assessment-service chat-service api-gateway; do
            echo "▸ Pushing $svc"
            docker buildx build \
              --platform linux/amd64 \
              --push \
              -t ${{ secrets.DOCKERHUB_USERNAME }}/lms-$svc:latest \
              -t ${{ secrets.DOCKERHUB_USERNAME }}/lms-$svc:${{ github.sha }} \
              ./$svc
          done

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./lms-ui
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/lms-ui:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/lms-ui:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          command_timeout: 20m
          script: |
            set -e
            REPO="https://raw.githubusercontent.com/HakobAvagyan/Learning-Management-System/master"
            DEPLOY_DIR="/opt/lms"

            mkdir -p $DEPLOY_DIR/loki
            mkdir -p $DEPLOY_DIR/grafana/provisioning/datasources
            mkdir -p $DEPLOY_DIR/grafana/provisioning/dashboards
            mkdir -p $DEPLOY_DIR/api-gateway

            curl -fsSL "$REPO/docker/docker-compose.prod.yml" -o $DEPLOY_DIR/docker-compose.yml
            curl -fsSL "$REPO/docker/loki/loki-config.yaml" -o $DEPLOY_DIR/loki/loki-config.yaml
            curl -fsSL "$REPO/docker/grafana/provisioning/datasources/loki.yaml" \
                 -o $DEPLOY_DIR/grafana/provisioning/datasources/loki.yaml
            curl -fsSL "$REPO/docker/grafana/provisioning/dashboards/dashboards.yaml" \
                 -o $DEPLOY_DIR/grafana/provisioning/dashboards/dashboards.yaml
            curl -fsSL "$REPO/docker/grafana/provisioning/dashboards/lms-logs.json" \
                 -o $DEPLOY_DIR/grafana/provisioning/dashboards/lms-logs.json
            curl -fsSL "$REPO/api-gateway/docker-application.yml" \
                 -o $DEPLOY_DIR/api-gateway/docker-application.yml

            cd $DEPLOY_DIR
            export DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f
            echo "✓ Deploy complete"