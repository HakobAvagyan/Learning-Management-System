name: CI/CD Pipeline

on:
  push:
    branches: [ master ]

jobs:

  build-and-push:
    name: Build & Push All Images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push backend images
        run: |
          for svc in user-service course-service enrollment-service notification-service \
                     progress-service media-service assessment-service api-gateway; do
            echo "▸ Pushing $svc"
            docker buildx build \
              --platform linux/amd64 \
              --push \
              -t ${{ secrets.DOCKERHUB_USERNAME }}/lms-$svc:latest \
              -t ${{ secrets.DOCKERHUB_USERNAME }}/lms-$svc:${{ github.sha }} \
              ./$svc
          done

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./lms-ui
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/lms-ui:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/lms-ui:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare deploy bundle
        run: |
          mkdir -p lms/loki
          mkdir -p lms/grafana/provisioning/datasources
          mkdir -p lms/grafana/provisioning/dashboards
          mkdir -p lms/api-gateway
          cp docker/docker-compose.prod.yml   lms/docker-compose.yml
          cp docker/loki/loki-config.yaml     lms/loki/
          cp docker/grafana/provisioning/datasources/loki.yaml \
             lms/grafana/provisioning/datasources/
          cp docker/grafana/provisioning/dashboards/dashboards.yaml \
             lms/grafana/provisioning/dashboards/
          cp docker/grafana/provisioning/dashboards/lms-logs.json \
             lms/grafana/provisioning/dashboards/
          cp api-gateway/docker-application.yml lms/api-gateway/

      - name: Upload config files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "lms"
          target: "/opt"
          overwrite: true

      - name: Pull new images & restart
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          envs: DOCKERHUB_USERNAME
          script: |
            cd /opt/lms
            export DOCKERHUB_USERNAME=$DOCKERHUB_USERNAME
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}