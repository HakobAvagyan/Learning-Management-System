spring:
  application:
    name: progress-service

  data:
    mongodb:
      uri: mongodb://lms:lms_secret@localhost:27017/lms_progress?authSource=admin

  kafka:
    bootstrap-servers: localhost:29092
    consumer:
      group-id: progress-service
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.value.default.type: com.lms.progressservice.dto.StudentEnrolledEvent
        spring.json.trusted.packages: "com.lms.*"
        spring.json.use.type.headers: false
    listener:
      ack-mode: MANUAL_IMMEDIATE

server:
  port: 8085

management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: always
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans

logging:
  pattern:
    level: "%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]"

services:
  course-service:
    url: http://localhost:8082