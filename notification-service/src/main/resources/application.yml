spring:
  application:
    name: notification-service

  data:
    mongodb:
      uri: mongodb://lms:lms_secret@localhost:27017/lms_notifications?authSource=admin

  kafka:
    bootstrap-servers: localhost:29092
    consumer:
      group-id: notification-service
      auto-offset-reset: earliest
      enable-auto-commit: false
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      properties:
        spring.json.value.default.type: com.lms.notificationservice.dto.StudentEnrolledEvent
        spring.json.trusted.packages: "com.lms.*"
        spring.json.use.type.headers: false
    listener:
      ack-mode: MANUAL_IMMEDIATE

server:
  port: 8084

management:
  endpoints:
    web:
      exposure:
        include: health, info
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans

logging:
  pattern:
    level: "%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]"
  level:
    com.lms.notificationservice: INFO